apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  # these are deployment level labels, they are not used for selecting pods, but can be useful for organizing and managing deployments
  labels:
    app: nginx
    purpose: deployment-demo
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
      purpose: deployment-demo
      tier: frontend
  # the template section defines the pod template that will be used to create pods for this deployment
  template:
    metadata:
      labels:
        app: nginx
        tier: frontend
        extra-key: extra-value
    spec:
      containers:
        - name: nginx
          image: nginx:stable-perl
          ports: 
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    app: nginx
    tier: frontend
    purpose: deployment-demo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80