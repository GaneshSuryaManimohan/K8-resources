apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    name: pod-1
    purpose: test-affinity
spec:
  containers:
  - name: nginx
    image: nginx
    imagePullPolicy: Always 
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    name: pod-2
    purpose: test-affinity-2
spec:
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: name
            operator: In
            values:
            - pod-1
        topologyKey: topology.kubernetes.io/zone
  containers:
  - name: nginx
    image: nginx
    imagePullPolicy: Always 