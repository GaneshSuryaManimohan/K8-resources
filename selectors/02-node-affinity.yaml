apiVersion: v1
kind: Pod
metadata:
  name: with-node-affinity
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: project
            operator: In
            values:
            - test
    containers:
    - name: with-node-affinity
      image: nginx:stable-perl
    tolerations:
    - key: "project"
      operator: "Equal"
      value: "expense"
      effect: "NoSchedule"
    

# A pod can be scheduled on a tainted node if it matches node affinity/selector and has the required toleration for the node’s taints.
# OR
# Taints don’t affect affinity, but pods must tolerate taints after matching affinity.